name: detections
# Path-filtered: runs only when detection content changes, so the empty scaffold stays green.
on:
  pull_request:
    paths:
      - 'aws-6-detection-as-code/**'
  push:
    branches: [main]
    paths:
      - 'aws-6-detection-as-code/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain
        run: |
          python -m pip install sigma-cli pytest pyyaml
          sigma plugin install splunk
      - name: Lint Sigma rules
        run: sigma check aws-6-detection-as-code/detections/
      - name: Convert to SPL
        run: |
          sigma list pipelines
          sigma convert -t splunk -p splunk_cim_dm aws-6-detection-as-code/detections/ \
            -o aws-6-detection-as-code/splunk/generated.spl
      - name: Run detection tests
        run: pytest aws-6-detection-as-code/tests/ -q
